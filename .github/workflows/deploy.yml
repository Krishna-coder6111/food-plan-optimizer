name: Deploy to GitHub Pages

# Build the static export and publish it on every push to main.
#
# ONE-TIME SETUP REQUIRED before the first deploy:
#   1. Go to repo Settings → Pages
#   2. Set "Source" to "GitHub Actions"
#   3. Save
# (The previous version tried `enablement: true` to do this automatically,
# but the workflow's GITHUB_TOKEN does not have permission to create the
# Pages site — that's an admin-level operation, hence the
# "Resource not accessible by integration" failure.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Suppress the "Node 20 actions are deprecated" runner warning. The
# upstream actions haven't published Node-24 builds yet; this opt-in
# flag runs them on Node 24, which is a no-op for these JS-only actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          # GH Pages serves project sites under /<repo>/. We read the repo
          # name from the GITHUB_REPOSITORY env var so this Just Works on a
          # fork too.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Inject .nojekyll
        # Pages defaults to running Jekyll which strips files starting with
        # underscore (Next emits _next/). The .nojekyll marker disables that.
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
