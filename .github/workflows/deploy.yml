name: Deploy to GitHub Pages

# Build the static export and publish it on every push to main.
# Requires GitHub Pages to be enabled with "Source = GitHub Actions" in
# Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          # GH Pages serves project sites under /<repo>/. We read the repo
          # name from the GITHUB_REPOSITORY env var so this Just Works on a
          # fork too.
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Inject .nojekyll
        # Pages defaults to running Jekyll which strips files starting with
        # underscore (Next emits _next/). The .nojekyll marker disables that.
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
