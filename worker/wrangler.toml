# Cloudflare Worker config — proxies live grocery / nutrition APIs.
# Step-by-step setup is in docs/API_PROXY.md.

name = "nutrient-engine-proxy"
main = "src/index.js"
compatibility_date = "2026-01-01"

# KV namespace for OAuth token + price caching. Create once with:
#   npx wrangler kv namespace create PRICE_CACHE
# then paste the printed `id` below. The same command also prints a
# `preview_id` — only needed if you want a separate KV namespace for
# `wrangler dev`; otherwise it reuses the production one.
[[kv_namespaces]]
binding = "PRICE_CACHE"
id = "REPLACE_WITH_NAMESPACE_ID"

# CORS — set to the origin that calls this Worker.
# Use '*' for testing; lock it down before going to prod.
[vars]
ALLOWED_ORIGINS = "https://krishna-coder6111.github.io,http://localhost:3000"
KROGER_API_BASE = "https://api-ce.kroger.com/v1"

# Secrets are NOT in this file. Push them with:
#   npx wrangler secret put FATSECRET_CLIENT_ID
#   npx wrangler secret put FATSECRET_CLIENT_SECRET
#   npx wrangler secret put KROGER_CLIENT_ID
#   npx wrangler secret put KROGER_CLIENT_SECRET
# For local `wrangler dev`, they live in .dev.vars (gitignored).
